name: Deploy to AWS Elastic Beanstalk

# Triger condition: exacute when code is push to main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. check out the code
      - name: Checkout source code
        uses: actions/checkout@v3

      # 2. set Java 17 env
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "corretto"

      # 3. maven compile and build the package
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. deploy to AWS Elastic Beanstalk
      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: PersonalWeb
          environment_name: PersonalWeb-env
          version_label: "app-${{ github.sha }}"
          region: us-east-1
          deployment_package: target/website-1.0.0.jar
