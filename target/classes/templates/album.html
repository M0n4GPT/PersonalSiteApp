<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${album.name} + ' · ' + ${owner.name} + ' ✨'">Album</title>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- Floating decorative elements -->
<div class="floating-decor">
    <span class="float-item" style="top:12%;right:5%;animation-delay:0s;">📸</span>
    <span class="float-item" style="top:45%;left:3%;animation-delay:2s;">🌸</span>
    <span class="float-item" style="top:75%;right:4%;animation-delay:1.5s;">✨</span>
</div>

<!-- ===================== NAVIGATION ===================== -->
<nav id="navbar">
    <div class="nav-container">
        <a th:href="@{/}" class="nav-logo">
            <span class="logo-emoji">🌸</span>
            <span th:text="${owner.name}">Your Name</span>
        </a>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a th:href="@{/}">Home</a></li>
            <li><a th:href="@{/gallery}" class="active">Gallery</a></li>
            <li><a href="#" class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">🌙</a></li>
        </ul>
    </div>
</nav>

<!-- ===================== ALBUM HEADER ===================== -->
<section class="page-header">
    <div class="container">
        <a th:href="@{/gallery}" class="back-link">← All Albums</a>
        <h1>
            <span th:text="${album.emoji}">📷</span>
            <span th:text="${album.name}">Album Name</span>
        </h1>
        <p th:text="${album.description}">Album description</p>
        <span class="album-meta" th:text="${#lists.size(album.photos)} + ' photos'">3 photos</span>
    </div>
</section>

<!-- ===================== PHOTO GRID ===================== -->
<section class="section">
    <div class="container">
        <div class="photo-grid" id="photoGrid">
            <div class="photo-item" th:each="photo, iterStat : ${album.photos}" th:data-index="${iterStat.index}">
                <img th:src="@{${photo.src}}" th:alt="${photo.caption}" loading="lazy" onerror="this.parentElement.classList.add('photo-error')"/>
                <div class="photo-placeholder">
                    <span>📷</span>
                    <small th:text="${photo.caption}">Photo caption</small>
                </div>
                <div class="photo-caption">
                    <span th:text="${photo.caption}">Caption</span>
                    <small th:if="${photo.date}" th:text="${photo.date}">2025-10</small>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- ===================== OTHER ALBUMS ===================== -->
<section class="section section-alt" th:if="${#lists.size(albums) > 1}">
    <div class="container">
        <h2 class="section-title"><span class="title-emoji">📂</span> Other Albums</h2>
        <div class="gallery-preview-grid">
            <a th:each="other : ${albums}" th:if="${other.slug != album.slug}" th:href="@{'/gallery/' + ${other.slug}}" class="album-card">
                <div class="album-cover">
                    <img th:src="@{${other.coverImage}}" th:alt="${other.name}" onerror="this.parentElement.classList.add('no-image')"/>
                    <div class="album-cover-fallback">
                        <span th:text="${other.emoji}">📷</span>
                    </div>
                </div>
                <div class="album-info">
                    <span class="album-emoji" th:text="${other.emoji}">📷</span>
                    <h3 th:text="${other.name}">Album</h3>
                    <span class="album-count" th:text="${#lists.size(other.photos)} + ' photos'">3 photos</span>
                </div>
            </a>
        </div>
    </div>
</section>

<!-- ===================== LIGHTBOX ===================== -->
<div id="lightbox" class="lightbox" style="display:none;">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <button class="lightbox-prev" id="lightboxPrev">‹</button>
    <button class="lightbox-next" id="lightboxNext">›</button>
    <div class="lightbox-content">
        <img id="lightboxImg" src="" alt=""/>
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>
</div>

<!-- ===================== FOOTER ===================== -->
<footer>
    <div class="container">
        <p>Made with 💕 by <span th:text="${owner.name}">Your Name</span> · <a th:href="@{/}">Back to Home</a></p>
    </div>
</footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
